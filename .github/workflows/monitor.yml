name: Monitor content health

on:
  schedule:
    - cron: "15 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run monitor
        run: |
          python scripts/monitor.py

      - name: Commit monitor report if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/monitor_report.json data/monitor_history.json

          if git diff --cached --quiet; then
            echo "No monitor changes."
            exit 0
          fi

          git commit -m "chore: update monitor report"
          git push

