# config/sources.yml

filters:
  ro_min_items: 16
  ro_try_relaxed: true
  ro_max_age_days: 45
  publish_cooldown_days: 35

  thresholds:
    romania: 0
    medical: 1
    science: 1
    environment: 1

sections:
  - id: romania
    title: Romania
    max_items: 40

  - id: medical
    title: Medical
    max_items: 25

  - id: science
    title: Stiinta
    max_items: 25

  - id: environment
    title: Mediu
    max_items: 25

rss_sources:
  romania:
    - name: Digi24
      url: https://www.digi24.ro/rss
    - name: HotNews
      url: https://hotnews.ro/feed/

    - name: Good News From Romania
      url: https://goodnewsfromromania.ro/feed/
    - name: Start-Up Romania
      url: https://start-up.ro/feed/
    - name: Green Start-Up Romania
      url: https://green.start-up.ro/feed/
    - name: Mindcraft Stories
      url: https://mindcraftstories.ro/feed/
    - name: Times New Roman (Satira)
      url: https://www.timesnewroman.ro/feed/
    - name: Descopera (Stiinta)
      url: https://www.descopera.ro/feed/
    - name: Life.ro (Lifestyle)
      url: https://life.ro/feed/
    - name: Positive News (Global)
      url: https://www.positive.news/feed/
    - name: B365 Lifestyle
      url: https://b365.ro/life/feed/
    - name: Turism Romania
      url: https://turism.gov.ro/web/feed/

    # Știri pozitive RO (WordPress)
    - name: StiriPozitive - Toate
      url: https://stiripozitive.com/feed/
    - name: StiriPozitive - Povesti de viata
      url: https://stiripozitive.com/category/povesti-de-viata/feed/
    - name: StiriPozitive - Ecologie
      url: https://stiripozitive.com/category/ecologie/feed/
    - name: StiriPozitive - Sport
      url: https://stiripozitive.com/category/sport/feed/
    - name: StiriPozitive - Cultura
      url: https://stiripozitive.com/category/cultura/feed/

    # RomâniaPozitivă (dacă feed-ul e disponibil în runtime)
    - name: RomaniaPozitiva
      url: https://www.romaniapozitiva.ro/feed/

    # Instituții / intervenții (pot avea disponibilitate variabilă de feed)
    - name: DSU Romania
      url: https://www.dsu.mai.gov.ro/feed/
    - name: IGSU Romania
      url: https://www.igsu.ro/feed/
    - name: Salvamont Romania
      url: https://salvamontromania.ro/feed/
    - name: Politia Romana
      url: https://www.politiaromana.ro/ro/rss

  medical:
    - name: ScienceDaily Health
      url: https://www.sciencedaily.com/rss/top/health.xml
    - name: ScienceDaily Medicine
      url: https://www.sciencedaily.com/rss/health_medicine.xml
    - name: Medical Xpress
      url: https://medicalxpress.com/rss-feed/
    - name: NIH News Releases
      url: https://www.nih.gov/news-events/news-releases/feed
    - name: Positive News
      url: https://www.positive.news/feed/

  science:
    - name: NASA Breaking News
      url: https://www.nasa.gov/rss/dyn/breaking_news.rss
    - name: ScienceDaily Science
      url: https://www.sciencedaily.com/rss/top/science.xml
    - name: Phys.org
      url: https://phys.org/rss-feed/
    - name: Positive News
      url: https://www.positive.news/feed/

  environment:
    - name: ScienceDaily Environment
      url: https://www.sciencedaily.com/rss/top/environment.xml
    - name: NASA Earth Observatory - Image of the Day
      url: https://earthobservatory.nasa.gov/feeds/image-of-the-day.rss
    - name: NASA Earth Observatory - Natural Hazards
      url: https://earthobservatory.nasa.gov/feeds/natural-hazards.rss
    - name: Mongabay Conservation
      url: https://news.mongabay.com/feed/
    - name: Positive News
      url: https://www.positive.news/feed/
